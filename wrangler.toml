name = "drop"
main = "src/index.ts"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[observability]
enabled = false

# Static assets — page routes are rendered by the Worker; built assets are still
# served from ASSETS.
[assets]
directory = "./dist/client"
not_found_handling = "404-page"
run_worker_first = ["/", "/room/*", "/api/*"]

[vars]
MAX_FILE_SIZE_MB = "100"
ROOM_TTL_HOURS = "24"
BLOCKED_MIME_TYPES = "application/x-msdownload,application/x-executable,application/x-sh,application/x-bat,application/x-msdos-program,application/x-ms-shortcut"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

[[durable_objects.bindings]]
name = "ROOM_INDEX"
class_name = "RoomIndexObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject", "RoomIndexObject"]

[triggers]
crons = ["0 * * * *"]

[[ratelimits]]
name = "ROOM_JOIN_RATE_LIMIT"
namespace_id = "1001"

[ratelimits.simple]
limit = 10
period = 60
