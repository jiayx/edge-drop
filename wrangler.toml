name = "drop"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets — Vite builds the frontend into dist/client; wrangler serves it.
# The ASSETS binding is injected into the Worker env automatically.
[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
MAX_FILE_SIZE_MB = "100"
ROOM_TTL_HOURS = "24"
BLOCKED_MIME_TYPES = "application/x-msdownload,application/x-executable,application/x-sh,application/x-bat,application/x-msdos-program,application/x-ms-shortcut"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

[[durable_objects.bindings]]
name = "ROOM_INDEX"
class_name = "RoomIndexObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject", "RoomIndexObject"]

[[r2_buckets]]
binding = "FILE_BUCKET"
bucket_name = "edge-drop-files"
preview_bucket_name = "edge-drop-files-dev"

[triggers]
crons = ["0 * * * *"]

[[ratelimits]]
name = "ROOM_JOIN_RATE_LIMIT"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 10
  period = 60
